version: 5.1.0
variant: default
logo:
  text: 锐冰龙的个人网站
head:
    favicon: favicon.ico
    open_graph:
      title:
      type: blog
      url:
      image:
      site_name:
      author: SharpIce
      description:
      twitter_card:
      twitter_id:
      twitter_site:
      google_plus:
      fb_admins:
      fb_app_id:
    structured_data:
      title:
      description:
      url:
      author: SharpIce
      image:
      publisher: SharpIce
      publisher_logo: /favicon.ico
    rss: /atom.xml
manifest:
    name: SharpIce
    short_name: Icarus
    start_url: https://sharpice.top/
    theme_color: "#00ffff"
    background_color: "#00ffff"
    display: standalone
    icons:
      src: /favicon.ico
      sizes: 512x512
      type: image/png
navbar:
    menu:
        主页: /
        存档: /archives
        分类: /categories
        标签: /tags
        关于: /about
    links:
footer:
    links:
        Creative Commons:
            icon: fab fa-creative-commons
            url: 'https://creativecommons.org/licenses/by-nc-sa/4.0/'
        GitHub:
            icon: fab fa-github
            url: "https://github.com/FurryRbl"
    copyright: "嗷呜~ 大部分内容都在CC BY-NC-SA 4.0开放哦~"
article:
    highlight:
        theme: atom-one-dark
        clipboard: true
        fold: unfolded
    readtime: true
    update_time: true
    licenses:
        Creative Commons:
            icon: fab fa-creative-commons
            url: 'https://creativecommons.org/'
        'CC BY-NC-SA 4.0': 'https://creativecommons.org/licenses/by-nc-sa/4.0/'
sidebar:
    left:
        sticky: false
    right:
        sticky: true
providers:
    cdn: loli
    fontcdn: ustc
    iconcdn: loli
donates:
  -
    type: afdian
    url: "https://afdian.net/a/SharpIce"
share:
    type: sharejs
plugins:
    cookie_consent:
        type: info
        theme: classic
        static: false
        position: bottom-left
        policyLink: "https://www.cookiesandyou.com/"
    outdated_browser: true
    animejs: false
    progressbar: false
search:
    type: insight
    include_pages: true


rss: /atom.xml
neat_enable: true
neat_html:
  enable: true
  exclude: 
neat_css:
  enable: true
  exclude:
    - '**/*.min.css'
neat_js:
  enable: true
  mangle: true
  output:
  compress:
  exclude:
    - '**/*.min.js'
    - '**/jquery.fancybox.pack.js'
    - '**/index.js'
baidusitemap:
    path: baidusitemap.xml
sitemap:
    path: sitemap.xml
clean_css:
  exclude: 
    - '*.min.css'
filter_optimize:
  enable: true
  remove_comments: false
  css:
    minify: true
    bundle: true
    delivery: true
    inlines:
    excludes:
  js:
    minify: true
    bundle: true
    excludes:
  priority: 12

